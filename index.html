 Methods", "vignette": "", "stem": "An analyst computes the following variance inflation factors (VIFs) for the independent variables in a regression model: Variable 1 (VIF = 1), Variable 2 (VIF = 7), Variable 3 (VIF = 12). Serious multicollinearity issues requiring correction are indicated for:", "options": {"A": "Variable 1 only.", "B": "Variable 3 only.", "C": "Variable 2 and Variable 3."}, "answer": "B", "explanation": "A. Incorrect because the VIF for Variable 1 is lower than 5, hence it falls within the normal range. The following are useful rules of thumb  |  VIFJ > 5 warrants further Investigation of the given independent variable VlFj> 10 indicates serious multicollinearity requiring correction B. Correct because the VIF for Variable 3 is higher than 10. VIF increases as the correlation between Variable j and the remaining independent variables increases: the higher the VIF, the more likely a given independent variable can be accurately predicted from the remaining independent variables, making it increasingly redundant. The following are useful rules of thumb VIFJ > 5 warrants further investigation of the given independent variable  |  VlFj > 10 indicates serious multicollinearity requiring correction C. Incorrect because the VIF for Variable 2 is lower than 10, hence it does not indicate serious multicollinearity. The following are useful rules of thumb VIFJ > 5 warrants further investigation of the given independent variable  |  VIFJ > 10 indicates serious multicollinearity requiring correction"}, {"id": 55, "topic": "Quantitative Methods", "vignette": "", "stem": "In a regression analysis using four independent variables and 80 observations, the leverage measure above which an observation is considered potentially influential is closest to:", "options": {"A": "0.11.", "B": "0.15.", "C": "0.19."}, "answer": "C", "explanation": "A. Incorrect because here the \"+1\" is replaced by \"-1\" in the correct calculation: thus calculating the threshold as 3(k - l)/n = 3(4- 1)/80 = o M125 = 0 11 B. Incorrect because here the \"+1\" is omitted in the correct calculation; thus calculating the threshold as 3(k/n) = 3(4/80) = 0 15 C. Correct because a useful rule of thumb for the leverage measure is that if an observation's leverage exceeds 3(k + 1 )/n, where k = number of independent variables and n = number of observations, then it is a potentially influential observation Here, k = 4 and n = 80. so the threshold is 3(k+ l)/n = 3(4 + 1)/80 = 01875 = 0 19"}, {"id": 56, "topic": "Quantitative Methods", "vignette": "", "stem": "An analyst estimates a multiple linear regression model with four independent variables using a sample of 100 observations: Observation 1 (leverage = 0.03), Observation 2 (leverage = 0.25), Observation 3 (leverage = 0.18). Based on the leverage measure, which of the following would most likely be considered influential observations?", "options": {"A": "Observation 1 only.", "B": "Observation 2 only.", "C": "Observation 2 and Observation 3."}, "answer": "C", "explanation": "A. Incorrect because the leverage measure for Observation 1 is 003: which is below the threshold of 0 15, hence it would not be considered an influential observation B. Incorrect because the leverage measure for Observation 2 is 095 and it would be considered an influential observation, however: the leverage measure for Observation 3 is 0 18, which is also above the threshold of 0 15: hence it would also be considered an influential observation. C. Correct because a useful rule of thumb for the leverage measure is that if an observation's leverage exceeds 3 x (k + l)/n, where k is the number of independent variables and n is the number of observations, i Ga 3 x (4 + 1)/100 = 0 151 then it is a potentially influential observation. Since the leverage measures for Observation 2 and Observation 3 (0 25 and 018, respectively) exceed the threshold of 0.15, these would be considered influential observations"}, {"id": 57, "topic": "Quantitative M (function(){
  "use strict";
  var Q = window.__QUESTIONS_DATA__ || [];
  var GROUP = 5;
  var LS_KEY = "cfa_quant_v2";
  var state = { per:{}, shuffle:false };
  try{ var s = JSON.parse(localStorage.getItem(LS_KEY)||"{}"); if(s && s.per) state = s; }catch(e){}
  if(!state.per) state.per={};
  if(typeof state.shuffle==="undefined") state.shuffle=false;

  function save(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
  function getQ(id){ return Q.find(function(q){return q.id===id;}); }
  function esc(s){ return (s||"").replace(/[&<>]/g,function(c){return c==="&"?"&amp;":c==="<"?"&lt;":"&gt;";}); }
  function shuffle(a){ for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;} return a; }
  function chunk(a,n){ var r=[]; for(var i=0;i<a.length;i+=n) r.push(a.slice(i,i+n)); return r; }

  function stats(){
    var done=0,right=0; var wrongIds=[];
    Q.forEach(function(q){ var p=state.per[q.id]; if(p&&p.answered){ done++; if(p.correct) right++; else wrongIds.push(q.id); } });
    return {total:Q.length, done:done, right:right, wrongIds:wrongIds};
  }

  function show(id){ ["view-home","view-quiz","view-results","view-wrong"].forEach(function(v){ document.getElementById(v).hidden=(v!==id);}); window.scrollTo(0,0); }
  function toast(m){ var t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); setTimeout(function(){t.classList.remove("show");},1700); }

  /* ---------- HOME ---------- */
  function renderHome(){
    var st=stats();
    document.getElementById("topPill").textContent = st.done+"/"+st.total;
    document.getElementById("sTotal").textContent=st.total;
    document.getElementById("sDone").textContent=st.done;
    document.getElementById("sRight").textContent=st.right;
    document.getElementById("sWrong").textContent=st.wrongIds.length;
    document.getElementById("sAcc").textContent= st.done? Math.round(st.right/st.done*100)+"%":"—";
    document.getElementById("homeBar").style.width=(st.total?st.done/st.total*100:0)+"%";
    document.getElementById("shuffleToggle").classList.toggle("on",!!state.shuffle);
    document.getElementById("btnWrong").disabled = st.wrongIds.length===0;
    var list=document.getElementById("browList"); document.getElementById("browCount").textContent=st.total+" 题";
    list.innerHTML="";
    Q.forEach(function(q){
      var p=state.per[q.id]||{};
      var badge = p.answered ? (p.correct?'<span class="badge right">✓</span>':'<span class="badge wrong">错</span>'):'';
      var d=document.createElement("div"); d.className="li";
      d.innerHTML='<div class="ix">#'+q.id+'</div><div class="t">'+esc(q.stem).slice(0,60)+(q.stem.length>60?'…':'')+'</div>'+badge;
      list.appendChild(d);
    });
  }

  /* ---------- QUIZ (grouped) ---------- */
  var queue=[], groups=[], gi=0, pi=0, sel={}; // sel: id->letter within current group
  function startQuiz(ids){
    if(!ids||!ids.length){
      var st=stats();
      var todo=Q.filter(function(q){return !(state.per[q.id]&&state.per[q.id].answered);}).map(function(q){return q.id;});
      if(!todo.length) todo=Q.map(function(q){return q.id;});
      ids=todo;
    }
    queue = state.shuffle ? shuffle(ids.slice()) : ids.slice();
    groups = chunk(queue, GROUP);
    gi=0;
    show("view-quiz"); loadGroup();
  }

  function loadGroup(){
    if(gi>=groups.length){ toast("全部完成 🎉"); renderHome(); show("view-home"); return; }
    sel={}; pi=0; renderQ();
  }

  function renderQ(){
    var grp=groups[gi]; var q=getQ(grp[pi]);
    document.getElementById("qTopic").textContent=q.topic||"Quantitative Methods";
    document.getElementById("qGrp").textContent="第 "+(gi+1)+" 组 · 第 "+(pi+1)+"/"+grp.length+" 题";
    document.getElementById("qOverall").textContent="共 "+(gi*GROUP+pi+1)+"/"+queue.length;
    document.getElementById("quizBar").style.width=((gi*GROUP+pi)/(queue.length)*100)+"%";
    // dots
    var dots=document.getElementById("dots"); dots.innerHTML="";
    grp.forEach(function(id,idx){ var i=document.createElement("i"); if(idx===pi)i.className="cur"; else if(sel[id])i.className="ans"; dots.appendChild(i); });
    var vbx=document.getElementById("vignetteBox");
    if(q.vignette&&q.vignette.trim()){ vbx.hidden=false; document.getElementById("vignetteText").textContent=q.vignette; } else vbx.hidden=true;
    document.getElementById("qStem").textContent=q.stem;
    var ob=document.getElementById("qOpts"); ob.innerHTML="";
    ["A","B","C"].forEach(function(L){
      var b=document.createElement("button"); b.className="opt"; b.dataset.letter=L;
      if(sel[q.id]===L) b.classList.add("sel");
      b.innerHTML='<div class="letter">'+L+'</div><div class="txt">'+esc(q.options[L]||"")+'</div>';
      b.onclick=function(){ sel[q.id]=L; renderQ(); };
      ob.appendChild(b);
    });
    var nb=document.getElementById("btnNext");
    var last = pi===grp.length-1;
    nb.textContent = last ? "提交本组 ✓":"下一题 →";
    nb.disabled = !sel[q.id];
    document.getElementById("kbHint").textContent = sel[q.id]?("已选 "+sel[q.id]):"点选答案后继续";
  }

  function nextOrSubmit(){
    var grp=groups[gi];
    if(!sel[grp[pi]]) return;
    if(pi<grp.length-1){ pi++; renderQ(); }
    else submitGroup();
  }

  function submitGroup(){
    var grp=groups[gi];
    grp.forEach(function(id){ var q=getQ(id); var p=state.per[id]||{};
      p.answered=true; p.userAnswer=sel[id]; p.correct=(sel[id]===q.answer); p.lastAttempt=Date.now();
      state.per[id]=p;
    });
    save();
    renderResults(grp);
  }

  function renderResults(grp){
    var correct=grp.filter(function(id){return state.per[id].correct;}).length;
    var box=document.getElementById("scoreBox");
    box.className="scorebox "+(correct>=4?"good":(correct>=3?"mid":"bad"));
    document.getElementById("scoreBig").textContent=correct+"/"+grp.length;
    document.getElementById("scoreLab").textContent = correct===grp.length?"全对，太棒了！":(correct>=3?"不错，继续加油":"本组错较多，看解析复习");
    var list=document.getElementById("resultsList"); list.innerHTML="";
    grp.forEach(function(id,idx){
      var q=getQ(id); var p=state.per[id];
      var d=document.createElement("div"); d.className="rq";
      var optsHtml=["A","B","C"].map(function(L){
        var cls="opt locked"; if(L===q.answer) cls+=" correct"; else if(L===p.userAnswer && !p.correct) cls+=" wrong"; else cls+=" dim";
        return '<button class="'+cls+'"><div class="letter">'+L+'</div><div class="txt">'+esc(q.options[L]||"")+'</div></button>';
      }).join("");
      var metaCls = p.correct?"meta ok":"meta no";
      var metaTxt = p.correct?("第 "+(idx+1)+" 题 · ✓ 答对"+(p.userAnswer?("（你选 "+p.userAnswer+"）"):"")):("第 "+(idx+1)+" 题 · ✗ 答错（你选 "+(p.userAnswer||"—")+"，正确 "+q.answer+"）");
      d.innerHTML='<div class="'+metaCls+'">'+metaTxt+'</div><div class="rstem">'+esc(q.stem)+'</div><div class="opts">'+optsHtml+'</div><div class="rexpl">'+esc(q.explanation||"（暂无解析）")+'</div>';
      list.appendChild(d);
    });
    document.getElementById("rNext").textContent = (gi>=groups.length-1)?"完成本轮 ✓":"下一组 →";
    show("view-results");
  }

  function nextGroup(){ gi++; if(gi>=groups.length){ toast("全部完成 🎉"); renderHome(); show("view-home"); return;} show("view-quiz"); loadGroup(); }

  /* ---------- WRONG BOOK ---------- */
  function renderWrong(){
    var ids=stats().wrongIds;
    document.getElementById("wrongCount").textContent= ids.length?(ids.length+" 题"):"暂无错题";
    var box=document.getElementById("wrongList");
    document.getElementById("wFoot").hidden = ids.length===0;
    if(!ids.length){ box.innerHTML='<div class="empty"><div class="big">🌱</div>还没有错题，继续加油！</div>'; return; }
    box.innerHTML='<div class="list"></div>'; var list=box.querySelector(".list");
    ids.forEach(function(id){ var q=getQ(id);
      var d=document.createElement("div"); d.className="li";
      d.innerHTML='<div class="ix">#'+id+'</div><div class="t">'+esc(q.stem).slice(0,70)+'…</div><span class="badge wrong">错</span>';
      list.appendChild(d);
    });
  }

  /* ---------- events ---------- */
  document.getElementById("btnStart").onclick=function(){ startQuiz(); };
  document.getElementById("btnWrong").onclick=function(){ var ids=stats().wrongIds; if(ids.length) startQuiz(ids); };
  document.getElementById("btnReviewWrong").onclick=function(){ renderWrong(); show("view-wrong"); };
  document.getElementById("wHome").onclick=function(){ renderHome(); show("view-home"); };
  document.getElementById("wPractice").onclick=function(){ var ids=stats().wrongIds; if(ids.length) startQuiz(ids); };
  document.getElementById("wClear").onclick=function(){ if(!confirm("清空错题本？将重置所有错题的练习记录。"))return;
    stats().wrongIds.forEach(function(id){ delete state.per[id]; }); save(); renderWrong(); toast("已清空错题本"); };
  document.getElementById("btnReset").onclick=function(){ if(!confirm("全部重置？将清除所有答题进度（错题/统计）。"))return; state.per={}; save(); renderHome(); toast("已重置进度"); };
  document.getElementById("btnHome").onclick=function(){ renderHome(); show("view-home"); };
  document.getElementById("btnNext").onclick=nextOrSubmit;
  document.getElementById("rHome").onclick=function(){ renderHome(); show("view-home"); };
  document.getElementById("rNext").onclick=nextGroup;
  document.getElementById("shuffleToggle").onclick=function(){ state.shuffle=!state.shuffle; save(); document.getElementById("shuffleToggle").classList.toggle("on",state.shuffle); toast(state.shuffle?"已开启随机顺序":"已按顺序练习"); renderHome(); };

  document.addEventListener("keydown",function(e){
    if(document.getElementById("view-quiz").hidden) return;
    var grp=groups[gi], q=getQ(grp[pi]);
    if(e.key==="a"||e.key==="A"||e.key==="1") sel[q.id]="A";
    else if(e.key==="b"||e.key==="B"||e.key==="2") sel[q.id]="B";
    else if(e.key==="c"||e.key==="C"||e.key==="3") sel[q.id]="C";
    else if(e.key==="Enter"||e.key==="ArrowRight"){ nextOrSubmit(); return; }
    else if(e.key==="ArrowLeft"){ if(pi>0){pi--; renderQ();} return; }
    else return;
    renderQ();
  });

  renderHome();
})();
</script>
</body>
</html>
